<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esri Türkiye · Organizasyon Şeması</title>

  <!-- Modern tipografi (internet varsa yüklenir, yoksa sistem fontuna düşer) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Arka plan aurora ışıkları -->
  <div class="aurora aurora--1"></div>
  <div class="aurora aurora--2"></div>
  <div class="aurora aurora--3"></div>

  <!-- Arka plan: topografik eşyükselti (kontur) çizgileri -->
  <svg class="topo" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <path id="topoBlob" d="M0,-100 C40,-104 92,-70 96,-24 C99,18 70,58 34,86
        C4,109 -44,104 -78,74 C-104,50 -110,4 -96,-38 C-84,-74 -44,-96 0,-100 Z"/>
    </defs>
    <g class="topo__cluster topo--blue" transform="translate(300 250) rotate(-8)">
      <use href="#topoBlob" transform="scale(1.55)"/>
      <use href="#topoBlob" transform="scale(1.28)"/>
      <use href="#topoBlob" transform="scale(1.02)"/>
      <use href="#topoBlob" transform="scale(0.78)"/>
      <use href="#topoBlob" transform="scale(0.54)"/>
      <use href="#topoBlob" transform="scale(0.32)"/>
    </g>
    <g class="topo__cluster topo--green" transform="translate(1140 660) rotate(12) scale(1.25)">
      <use href="#topoBlob" transform="scale(1.5)"/>
      <use href="#topoBlob" transform="scale(1.22)"/>
      <use href="#topoBlob" transform="scale(0.96)"/>
      <use href="#topoBlob" transform="scale(0.7)"/>
      <use href="#topoBlob" transform="scale(0.46)"/>
    </g>
    <g class="topo__cluster topo--green" transform="translate(880 170) rotate(6) scale(0.8)">
      <use href="#topoBlob" transform="scale(1.4)"/>
      <use href="#topoBlob" transform="scale(1.1)"/>
      <use href="#topoBlob" transform="scale(0.82)"/>
      <use href="#topoBlob" transform="scale(0.54)"/>
    </g>
    <g class="topo__cluster topo--blue" transform="translate(160 780) rotate(-14) scale(0.95)">
      <use href="#topoBlob" transform="scale(1.45)"/>
      <use href="#topoBlob" transform="scale(1.16)"/>
      <use href="#topoBlob" transform="scale(0.88)"/>
      <use href="#topoBlob" transform="scale(0.6)"/>
      <use href="#topoBlob" transform="scale(0.36)"/>
    </g>
  </svg>

  <!-- Üst bar -->
  <header class="topbar">
    <div class="brand">
      <!-- Resmi Esri logosu. Dosya bulunamazsa yedek SVG işarete düşer. -->
      <img class="brand__logo" src="esri-logo-clean.png" alt="Esri Türkiye"
           onerror="this.onerror=null; this.replaceWith(document.getElementById('logoFallback').content.cloneNode(true));" />
      <template id="logoFallback">
        <svg class="brand__logo" viewBox="0 0 132 40" role="img" aria-label="Esri Türkiye">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#0079c1"/>
              <stop offset="100%" stop-color="#3fa535"/>
            </linearGradient>
          </defs>
          <g fill="none" stroke="url(#logoGrad)" stroke-width="2.2">
            <circle cx="20" cy="20" r="15"/>
            <ellipse cx="20" cy="20" rx="6.2" ry="15"/>
            <path d="M6 14 H34 M6 26 H34"/>
          </g>
          <circle cx="20" cy="20" r="2.6" fill="url(#logoGrad)"/>
          <text x="45" y="27" font-family="Inter, Segoe UI, sans-serif"
                font-size="24" font-weight="800" letter-spacing="-.5"
                fill="#00426b">esri</text>
        </svg>
      </template>
      <div class="brand__text">
        <strong>Esri Türkiye</strong>
        <span>Organizasyon Şeması</span>
      </div>
    </div>

    <div class="author">
      <span class="author__label">Hazırlayan:</span>
      <strong class="author__name">Sıla Cicili</strong>
    </div>
  </header>

  <!-- Sahne: sürükle-kaydır + zoom bu alanda olur -->
  <main id="stage" class="stage">
    <div id="canvas" class="canvas">
      <!-- Bağlantı çizgileri (kartların ALTINDA) -->
      <svg id="lines" class="lines" xmlns="http://www.w3.org/2000/svg"></svg>
      <!-- Kart ağacı JS tarafından buraya basılır -->
      <div id="tree" class="tree"></div>
    </div>
  </main>

  <!-- Departman renk lejantı (JS ile doldurulur) -->
  <aside id="legend" class="legend" aria-label="Departman renkleri"></aside>

  <footer class="hint">Sürükleyerek kaydır · Fare tekerleği ile yakınlaştır · Departmana tıklayıp kısa bilgi edinin</footer>

  <script src="script.js"></script>
</body>
</html>
